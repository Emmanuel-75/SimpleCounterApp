<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <!-- GDGoCBowen30DayChallenge Day 12 -->
    <title>Interactive Counter</title>
  </head>
  <body class="min-h-screen flex justify-center items-center bg-gradient-to-r from-purple-200 to-violet-300 text-violet-950">
    <section class="w-80 bg-white p-6 flex flex-col gap-6 rounded-xl hover:scale-105 shadow-lg hover:shadow-2xl hover:ring-4 hover:ring-violet-700 transition-all duration-300 ease-in-out">
      <h1 class="font-bold text-2xl text-center animate-bounce transition-all duration-300 ease-in-out" id="title">Simple Interactive Counter</h1>
      <!-- <p id="counter" class="text-center font-bold text-4xl border-2 border-violet-400 py-8 rounded-2xl transition-all duration-300 ease-in-out"> -->
      <p class="h-auto text-center border-2 border-violet-400 py-8 rounded-2xl relative">
        <span id="counter" class=" font-bold text-4xl  transition-all duration-300 ease-in-out">0</span>
        <span id="statusText" class="absolute top-5"></span>
      </p>
      <div class="flex justify-around">
        <button id="increase" class="bg-purple-300 text-2xl py-1.5 px-8 rounded-xl font-bold transition-all duration-300 ease-in-out active:scale-110 hover:ring-4 hover:ring-purple-700 shadow-lg hover:shadow-xl">+</button>
        <button id="decrease" class="bg-purple-300 text-2xl py-1.5 px-8 rounded-xl font-bold transition-all duration-300 ease-in-out active:scale-110 hover:ring-4 hover:ring-purple-700 shadow-lg hover:shadow-xl">-</button>
      </div>
      <button id="reset" class="bg-purple-300 w-[50%] m-auto rounded-xl py-2.5 font-bold transition-all duration-300 ease-in-out active:scale-110 hover:ring-4 hover:ring-purple-700
      shadow-lg hover:shadow-xl">Reset</button>
    </section>
    <script src="script.js"></script>
  </body>
</html>
